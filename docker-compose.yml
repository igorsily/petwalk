version: '3.8'
services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: petwalk
    ports:
      - '5432:5432'
    volumes:
      - petwalk_pgdata:/var/lib/postgresql/data

volumes:
  petwalk_pgdata:
